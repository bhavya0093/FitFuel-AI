<div id="settings-section" class="content-section">
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="form-grid">

        <div class="form-group">
            <label>First Name</label>
            <input type="text" name="firstname" value="{{ sid.firstname }}">
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="lastname" value="{{ sid.lastname }}">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" value="{{ uid.email }}" readonly>
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="text" name="contectno" value="{{ sid.contectno }}">
        </div>

        <div class="form-group">
            <label>Store Name</label>
            <input type="text" name="seller_store_name" value="{{ sid.seller_store_name }}">
        </div>

        <div class="form-group">
            <label>City</label>
            <input type="text" name="city" value="{{ sid.city }}">
        </div>

        <div class="form-group">
            <label>GST Number</label>
            <input type="text" name="GSTNO" value="{{ sid.GSTNO }}">
        </div>

        <div class="form-group full-width">
            <label>Address</label>
            <textarea name="address">{{ sid.address }}</textarea>
        </div>

        <div class="form-group full-width">
            <label>Profile Picture</label>
            <input type="file" name="pic">
        </div>

    </div>

    <hr style="margin:35px 0;">

    <h3 class="form-title">
        <i class="fas fa-moon" style="color: #10b981; margin-right: 8px;"></i> Display & Appearance
    </h3>

    <div style="display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; background: rgba(30, 41, 59, 0.05); border-radius: 16px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);">
        <div>
            <strong style="display: block; font-size: 1rem;">Dark Mode Theme</strong>
            <span style="font-size: 0.85rem; opacity: 0.8;">Switch between low-light Dark Mode and standard Light Mode UI.</span>
        </div>
        <label class="switch-toggle" style="position: relative; display: inline-block; width: 50px; height: 26px; cursor: pointer;">
            <input type="checkbox" id="pref-dark-mode" style="opacity: 0; width: 0; height: 0;">
            <span class="slider-toggle" style="position: absolute; inset: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px;"></span>
        </label>
    </div>

    <hr style="margin:35px 0;">

    <h3 class="form-title">
        Change Password
    </h3>

    <div class="form-grid">

        <div class="form-group">
            <label>Current Password</label>
            <input type="password" name="current_password">
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password">
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password">
        </div>

    </div>

    <button type="submit" class="submit-btn">
        <i class="fas fa-save"></i>
        Save Changes
    </button>

</form>
</div>
