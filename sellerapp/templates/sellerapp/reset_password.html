{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — FitFuel AI</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
   <style>

.otp-head label{
    margin:0;
    font-weight:600;
}

.otp-timer{
    text-align:right;
    margin-top:-10px;
    margin-bottom:10px;
    font-size:14px;
    color:#7a8ca5;
}

#timer{
    color:#10b981;
    font-weight:700;
}

.resend-box{
    text-align:right;
    margin-bottom:15px;
}

.resend-btn{
    color:#10b981;
    text-decoration:none;
    font-weight:700;
}

.resend-btn:hover{
    color:#059669;
}

   </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <!-- FIXED HEADER: icon + title ek line mein -->
            <div class="form-header">
                <div class="header-icon">
                    <i class="fas fa-key"></i>
                </div>
                <div class="header-text">
                    <h2 class="login-title">Reset Password</h2>
                </div>
            </div>
       
    {% if s_msg %}
    <div class="alert alert-success" role="alert">
        {{s_msg}}
    </div>
    {% endif %}

        <form action="{% url 'reset_password' %}" method="POST">
            
            {% csrf_token %}

            <!-- Email Field -->
                
                <input type="hidden" placeholder="john.doe@example.com" value="{{email}}" required name="email">

                   <div class="input-field">
                    <label><i class="fas fa-envelope"></i> OTP</label>
                    <input type="text" placeholder="Enter OTP" required name="otp">
                </div>

                <div class="otp-timer">
                    OTP expires in <span id="timer">01:00</span>
                </div>

                <div class="resend-box" id="resendBox" style="display:none;">
                    <a href="{% url 'resend_otp' email %}" class="resend-btn">
                        Resend OTP
                    </a>
                </div>

            <div class="input-field">
                <label><i class="fas fa-envelope"></i> New Password</label>
                <input type="password" placeholder="Enter New Password" required name="newpassword">
            </div>
            <div class="input-field">
                <label><i class="fas fa-envelope"></i>Re-Type Password</label>
                <input type="password" placeholder="Enter Repeat Password" required name="repassword">
            </div>

            <!-- Submit Button -->
            <input type="submit" class="login-btn" value="Change Password">

            <!-- Register Hint – now points to registration (Admin/User) -->
            <div class="register-hint">
                <span style="display: block; font-size:0.7rem; margin-top:5px; color: #a0aec0;">
                    <i class="fas fa-user-tag"></i> Admin / User
                </span>
            </div>
        </form>
    </div>
</div>

    <!-- (no script needed, inline onsubmit handles validation) -->

<script>
let time = 60;

let timer = setInterval(function(){

    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    document.getElementById("timer").innerHTML =
        `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

    time--;

    if(time < 0){

        clearInterval(timer);

        document.querySelector(".otp-timer").style.display = "none";

        document.getElementById("resendBox").style.display = "block";
    }

},1000);


</script>
</body>
</html>
