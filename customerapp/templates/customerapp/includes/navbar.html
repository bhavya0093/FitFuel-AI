{% load static %}
<nav class="ff-navbar">

    <!-- ===========================
         Logo Section
    ============================ -->

    <div class="ff-logo">

        <a href="{% url 'customer_dashboard' %}" class="ff-logo-link">

            <div class="ff-logo-icon">
                <i class="fa-solid fa-heart-pulse"></i>
            </div>

            <div class="ff-logo-text">

                <h2>FitFuel AI</h2>

                <span>Personalized Nutrition</span>

            </div>

        </a>

    </div>

    <!-- ===========================
         Search
    ============================ -->

    <div class="ff-search">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
            type="text"
            placeholder="Search proteins, meals, supplements..."
        >

    </div>

    <!-- ===========================
         Navigation
    ============================ -->



    <!-- ===========================
         Right Actions
    ============================ -->

    <div class="ff-actions">
            <!-- Notification -->

    <button class="ff-icon" title="Notifications">

        <i class="fa-regular fa-bell"></i>

        <span class="ff-badge">3</span>

    </button>

    <!-- Wishlist -->
    <a href="{% url 'wishlist' %}" class="ff-icon" title="Wishlist">
        <i class="fa-regular fa-heart"></i>
    </a>

    <!-- Cart -->
    <label for="nav-cart" class="ff-icon ff-cart" title="Cart" style="cursor: pointer;">
        <i class="fa-solid fa-bag-shopping"></i>
        {% if cart_count and cart_count != '0' and cart_count != 0 %}
        <span class="ff-badge">
            {{ cart_count }}
        </span>
        {% endif %}
    </label>

    <!-- Profile -->

    <div class="ff-profile">

      <div class="ff-profile-image">

    {% if cid.pic %}

        <img src="{{ cid.pic.url }}" alt="Profile">

    {% else %}

        <img src="{% static 'customerapp/images/default-user.png' %}" alt="Profile">

    {% endif %}

</div>

        <div class="ff-user">

            <strong>

                {{ cid.firstname }} {{ cid.lastname }}

            </strong>

            <small>

                Premium Member

            </small>

        </div>

        <i class="fa-solid fa-chevron-down"></i>

        <!-- Dropdown -->

        <div class="ff-dropdown">

            <a href="{% url 'profile' %}">

                <i class="fa-regular fa-user"></i>

                My Profile

            </a>

            <a href="{% url 'meal_planner' %}">
                <i class="fa-solid fa-chart-line"></i>
                Progress
            </a>

            <a href="{% url 'profile' %}">
                <i class="fa-solid fa-gear"></i>
                Settings
            </a>

            <hr>

            <a href="{% url 'logout' %}" class="logout">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </a>

        </div>

    </div>

</div>
    <!-- ===========================
         Mobile Toggle
    ============================ -->

    <button class="ff-mobile-toggle">

        <i class="fa-solid fa-bars"></i>

    </button>

</div>

</nav>

<!-- ===========================
     Mobile Menu
=========================== -->

<div class="ff-mobile-menu">
    <label for="nav-home" class="mobile-item" style="cursor: pointer;">
        <i class="fa-solid fa-house"></i>
        Dashboard
    </label>
    <label for="nav-assessment" class="mobile-item" style="cursor: pointer;">
        <i class="fa-solid fa-brain"></i>
        AI Assessment
    </label>
    <label for="nav-home" class="mobile-item" style="cursor: pointer;">
        <i class="fa-solid fa-store"></i>
        Nutrition Store
    </label>
    <a href="{% url 'meal_planner' %}">
        <i class="fa-solid fa-utensils"></i>
        Meal Plans
    </a>
    <a href="{% url 'meal_planner' %}">
        <i class="fa-solid fa-chart-line"></i>
        Progress
    </a>
    <label for="nav-cart" class="mobile-item" style="cursor: pointer;">
        <i class="fa-solid fa-cart-shopping"></i>
        My Cart
    </label>
    <a href="{% url 'wishlist' %}">
        <i class="fa-solid fa-heart"></i>
        Wishlist
    </a>
    <a href="{% url 'orders' %}">
        <i class="fa-solid fa-box"></i>
        Orders
    </a>
    <label for="nav-profile" class="mobile-item" style="cursor: pointer;">
        <i class="fa-solid fa-user"></i>
        Profile
    </label>
    <a href="{% url 'logout' %}" class="logout">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
    </a>
</div>
