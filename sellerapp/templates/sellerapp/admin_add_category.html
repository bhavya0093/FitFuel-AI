<!-- ADD CATEGORY -->
        <div id="addCategory-section" class="content-section">
            <div class="form-container">
                <div class="form-title">
                    <h2><i class="fas fa-plus-circle" style="color:#667eea;"></i> Add New Category</h2>
                    <label class="back-btn" for="nav-categories"><i class="fas fa-arrow-left"></i> Back</label>
                </div>
                <form method="POST" action="#">
                    <div class="form-grid">
                        <div class="form-group full-width"><label>Category Name *</label><input type="text" name="category_name" required></div>
                        <div class="form-group"><label>Icon</label><input type="text" name="icon" value=""></div>
                        <div class="form-group"><label>Status</label><select name="status"><option value="Active">Active</option><option value="Inactive">Inactive</option></select></div>
                        <div class="form-group full-width"><label>Description</label><textarea name="description" rows="3"></textarea></div>
                    </div>
                    <button type="submit" class="submit-btn"><i class="fas fa-save"></i> Save Category</button>
                </form>
            </div>
        </div>
