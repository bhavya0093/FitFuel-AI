{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — FitFuel AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">

            <!-- Brand Logo -->
            <div class="brand-logo">
                <div class="logo-icon"><i class="fas fa-heartbeat"></i></div>
                <div class="logo-text">
                    <div class="logo-title-text">FitFuel AI</div>
                    <div class="logo-subtitle-text">Smarter Shopping</div>
                </div>
            </div>

            <!-- Badge -->
            <div class="badge-secure">
                <span class="badge-dot"></span>
                Secure Portal
            </div>

            <!-- Title -->
            <div class="login-title">Welcome back 👋</div>
            <div class="login-sub">Sign in to your FitFuel account</div>

            <!-- Success Message -->
            {% if s_msg %}
            <div class="alert-success">{{ s_msg }}</div>
            {% endif %}

            <!-- Error Message -->
            {% if e_msg %}
            <div class="alert-danger" style="background: #fef2f2; border: 1px solid #fee2e2; color: #b91c1c; padding: 12px; border-radius: 8px; font-size: 0.875rem; margin-bottom: 20px; text-align: center;">
                <i class="fas fa-exclamation-circle" style="margin-right: 6px;"></i> {{ e_msg }}
            </div>
            {% endif %}

            <!-- Form -->
            <form action="{% url 'login' %}" method="POST">
                {% csrf_token %}

                <!-- Email -->
                <div class="input-field">
                    <label>
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <div class="input-wrap">
                        <input
                            type="email"
                            name="email"
                            placeholder="john.doe@example.com"
                            autocomplete="email"
                            required
                        >
                        <span class="input-icon"><i class="fas fa-at"></i></span>
                    </div>
                </div>

                <!-- Password -->
                <div class="input-field">
                    <label>
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="input-wrap">
                        <input
                            type="password"
                            name="password"
                            id="login-password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                        >
                        <span class="input-icon"><i class="fas fa-key"></i></span>
                        <span class="toggle-password" onclick="togglePasswordVisibility()"><i class="fas fa-eye-slash" id="toggle-icon"></i></span>
                    </div>
                </div>

                <!-- Remember + Forgot -->
                <div class="meta-row">
                    <label class="remember-label">
                        <input type="checkbox" name="remember">
                        Remember me
                    </label>
                    <a href="{% url 'forgot_password' %}" class="forgot-link">Forgot password?</a>
                </div>

                <!-- Submit -->
                <input type="submit" class="login-btn" value="Log In →">

                <!-- Footer -->
                <div class="register-hint">
                    Don't have an account?
                    <a href="{% url 'register' %}">Register here</a>
                </div>

            </form>
        </div>
    </div>

    <script>
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById("login-password");
        const toggleIcon = document.getElementById("toggle-icon");
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleIcon.classList.remove("fa-eye-slash");
            toggleIcon.classList.add("fa-eye");
        } else {
            passwordInput.type = "password";
            toggleIcon.classList.remove("fa-eye");
            toggleIcon.classList.add("fa-eye-slash");
        }
    }
    </script>

</body>
</html>
