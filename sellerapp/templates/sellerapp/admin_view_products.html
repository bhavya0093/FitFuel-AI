<!-- ALL / VIEW PRODUCTS -->
        <div id="allProducts-section" class="content-section">
            <div class="all-products-container">
                <div class="products-header">
                    <h2><i class="fas fa-eye"></i> View Products</h2>
                    <input type="text" placeholder="Search product..." class="product-search">
                </div>
                <p style="font-size:0.80rem;color:#60a5fa;font-weight:600;margin-bottom:16px;">
                    <i class="fas fa-info-circle"></i> Click on any product card to view full details, edit or delete.
                </p>
                <div class="all-products-grid">
                    {% for p in pid %}
                    <div class="product-card-all">
                        <img src="{{p.picture.url}}" alt="{{p.product_name}}">
                        <div class="product-info-all">
                            <h4>{{p.product_name}}</h4>
                            <div style="font-size:0.72rem;color:#60a5fa;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">{{p.product_category}}</div>
                            <div class="product-price-all">Rs.{{p.product_price}}</div>
                            <div style="font-size:0.75rem;color:#94a3b8;margin-bottom:10px;">Stock: {{p.stock_qty}} units</div>
                            <label class="view-details-btn" for="nav-product-{{p.id}}">
                                <i class="fas fa-eye"></i> View Details
                            </label>
                            
                        </div>
                    </div>
                    {% empty %}
                    <div style="grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8;">
                        <i class="fas fa-box-open" style="font-size:3rem;margin-bottom:12px;display:block;"></i>
                        <p style="font-weight:700;font-size:1rem;">No products found</p>
                        <p style="font-size:0.82rem;margin-top:6px;">Add your first product using the Add Product section.</p>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
