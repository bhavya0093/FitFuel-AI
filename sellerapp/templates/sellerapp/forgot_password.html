{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">

            <!-- FIXED HEADER: icon + title ek line mein -->
            <div class="form-header">
                <div class="header-icon">
                    <i class="fas fa-sign-in-alt"></i>
                </div>
                <div class="header-text">
                    <h2 class="login-title">Forgot Password</h2>
                </div>
            </div>

            {% if e_msg %}
            <div class="alert-danger-box" role="alert">{{ e_msg }}</div>
            {% endif %}

            <form action="{% url 'forgot_password' %}" method="POST">
                {% csrf_token %}

                <!-- Email Field -->
                <div class="input-field">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <div class="input-wrap">
                        <span class="input-icon"><i class="fas fa-at"></i></span>
                        <input type="email" placeholder="john.doe@example.com" value="{{ email }}" name="email" required>
                    </div>
                </div>

                <!-- Submit -->
                <input type="submit" class="login-btn" value="Send OTP →">

                <!-- Footer -->
                <div class="register-hint">
                    You have an account? <a href="{% url 'login' %}">Login</a>
                    <span style="display:block;margin-top:8px;font-size:11px;color:#94a3b8;">
                        <i class="fas fa-user-tag"></i> Admin / User
                    </span>
                </div>
            </form>

        </div>
    </div>

</body>
</html>
